<div class="container-fluid">
    <!-- title and Button section  -->
    <section class="Header-Page d-flex justify-content-between align-items-center mt-3">
        <div class="mx-1">
            <p class="h3 fw-bold mb-0">Movies</p>
            <p class="text-muted mb-0">Manage Movies in database.</p>
        </div>
        <a routerLink="" class="btn btn-outline-light">
            Add Movie
        </a>
        
    </section>

    <!-- table section -->
    <section class="data-table mt-4">
        <div class="card bg-dark border-0 shadow">
            <div class="card-body">
                <!-- head table -->
                <table class="table">
                    <thead>
                        <tr>
                            <th class="col text-light text-center">ID</th>
                            <th class="col text-light text-center">Title</th>
                            <th class="col text-light text-center">Description</th>
                            <th class="col text-light text-center">Duration-minutes</th>
                            <th class="col text-light text-center">Release-date</th>
                            <th class="col text-light text-center">Director</th>
                            <th class="col text-light text-center">Created-at</th>
                            <th class="col text-light text-center">Image-url</th>
                            <th colspan="2" class="col text-light text-center">Manage</th>
                        </tr>
                    </thead>
                    <!-- body table -->
                    <tbody class="text-light">
                        @for (item of movie; track $index) {
                        <tr>
                        <th scope="row">1</th>
                        <td class="col text-center">acb </td>
                        <td class="col text-center">Otto</td>
                        <td class="col text-center">@mdo</td>
                        <td class="col text-center">Mark</td>
                        <td class="col text-center">Otto</td>
                        <td class="col text-center">@mdo</td>
                        <td class="col text-center">@mdo</td>
                        <td class="col text-center"><button type="button" class="btn btn-outline-light">Edit</button></td>
                        <td class="col text-center"><button type="button" class="btn btn-outline-danger">Delete</button></td>
                        </tr>
                    }
                    </tbody>
                </table>
            </div>
        </div>

    </section>
</div>
