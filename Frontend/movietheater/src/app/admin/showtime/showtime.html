<div class="showtime-wrapper">

 <div class="showtime-header">
  <div>
    <h2>Manage Showtimes</h2>
    <p class="subtitle">Manage and schedule movie showtimes across all screens.</p>
  </div>
  <button class="btn-add" (click)="openShowtimeModal()">
    Add Showtime
  </button>
</div>

  <div class="table-card">
    <table class="showtime-table">

      <thead>
        <tr>
          <th>Movie</th>
          <th>Screen</th>
          <th>Start Time</th>
          <th>Duration</th>
          <th>Price</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let s of showtimes">

          <td class="movie-title">
            {{ s.movie_title }}
          </td>

          <td>
            {{ s.screen_name }}
          </td>

          <td>
            {{ s.start_time | date:'medium' }}
          </td>

          <td>
            {{ s.duration_minutes }} min
          </td>

          <td class="price">
            {{ s.price | number:'1.0-2' }} ฿
          </td>

          <td class="actions">
            <button class="btn-edit" (click)="editShowtime(s)">Edit</button>
            <button class="btn-delete" (click)="deleteShowtime(s.id)">Delete</button>
          </td>

        </tr>
      </tbody>

    </table>
  </div>

</div>

<!-- EDIT SHOWTIME MODAL -->
<div class="modal-backdrop" *ngIf="editingShowtime">
  <div class="modal-box">

    <div class="modal-header">
      <span class="modal-title">Edit Showtime</span>
      <button class="modal-close" (click)="editingShowtime = null">×</button>
    </div>

    <div class="field">
      <label>Movie</label>
      <select [(ngModel)]="editData.movie_id">
        <option *ngFor="let m of movies" [ngValue]="m.id">{{ m.title }}</option>
      </select>
    </div>

    <div class="field">
      <label>Screen</label>
      <select [(ngModel)]="editData.screen_id">
        <option *ngFor="let s of screens" [ngValue]="s.id">{{ s.name }}</option>
      </select>
    </div>

    <div class="field">
      <label>Start Time</label>
      <input type="datetime-local" [(ngModel)]="editData.start_time">
    </div>

    <div class="field">
      <label>Price (THB)</label>
      <input type="number" [(ngModel)]="editData.price">
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" (click)="editingShowtime = null">Cancel</button>
      <button class="btn-save" (click)="updateShowtime()">Save Changes</button>
    </div>

  </div>
</div>

<!-- ADD SHOWTIME MODAL -->
<div class="modal-backdrop" *ngIf="showAddModal">
  <div class="modal-box">

    <div class="modal-header">
      <span class="modal-title">Add Showtime</span>
      <button class="modal-close" (click)="showAddModal = false">×</button>
    </div>

    <div class="field">
      <label>Movie</label>
      <select [(ngModel)]="addData.movie_id">
        <option *ngFor="let m of movies" [ngValue]="m.id">
          {{ m.title }}
        </option>
      </select>
    </div>

    <div class="field">
      <label>Screen</label>
      <select [(ngModel)]="addData.screen_id">
        <option *ngFor="let s of screens" [ngValue]="s.id">
          {{ s.name }}
        </option>
      </select>
    </div>

    <div class="field">
      <label>Start Time</label>
      <input type="datetime-local" [(ngModel)]="addData.start_time">
    </div>

    <div class="field">
      <label>Price (THB)</label>
      <input type="number" [(ngModel)]="addData.price">
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" (click)="showAddModal = false">
        Cancel
      </button>
      <button class="btn-save" (click)="createShowtime()">
        Create
      </button>
    </div>

  </div>
</div>
