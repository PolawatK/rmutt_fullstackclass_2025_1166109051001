<div class="showtime-wrapper">

 <div class="showtime-header">
  <div>
    <h2>Manage Showtimes</h2>
    <p class="subtitle">Manage and schedule movie showtimes across all screens.</p>
  </div>
  <button class="btn-add" (click)="openShowtimeModal()">
    + Add Showtime
  </button>
</div>

  <div class="table-card">
    <table class="showtime-table">

      <thead>
        <tr>
          <th>Movie</th>
          <th>Screen</th>
          <th>Start Time</th>
          <th>Duration</th>
          <th>Price</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let s of showtimes">

          <td class="movie-title">
            {{ s.movie_title }}
          </td>

          <td>
            {{ s.screen_name }}
          </td>

          <td>
            {{ s.start_time | date:'medium' }}
          </td>

          <td>
            {{ s.duration_minutes }} min
          </td>

          <td class="price">
            {{ s.price | number:'1.0-2' }} ฿
          </td>

          <td class="actions">
            <button class="btn-edit" (click)="editShowtime(s)">Edit</button>
            <button class="btn-delete" (click)="deleteShowtime(s.id)">Delete</button>
          </td>

        </tr>
      </tbody>

    </table>
  </div>

</div>
