<div class="showtime-wrapper">

  <div class="showtime-header">
    <h2>🎬 Manage Showtimes</h2>

    <button class="btn-add" (click)="openShowtimeModal()">
      + Add Showtime
    </button>
  </div>


  <div class="table-card">

    <table class="showtime-table">

      <thead>
        <tr>
          <th>Movie</th>
          <th>Screen</th>
          <th>Start Time</th>
          <th>Duration</th>
          <th>Price</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody>

        <tr *ngFor="let s of showtimes">

          <td class="movie-title">
            🎬 {{ s.movie_title }}
          </td>

          <td>
            <span class="screen-badge">
              {{ s.screen_name }}
            </span>
          </td>

          <td>
            {{ s.start_time | date:'medium' }}
          </td>

          <td>
            <span class="duration">
              {{ s.duration_minutes }} min
            </span>
          </td>

          <td class="price">
            {{ s.price | number:'1.0-2' }} ฿
          </td>

          <td class="actions">

            <button class="btn-edit">
              Edit
            </button>

            <button class="btn-delete">
              Delete
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
