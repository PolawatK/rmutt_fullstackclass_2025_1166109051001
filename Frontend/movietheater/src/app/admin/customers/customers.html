<div class="container-fluid " style="padding:40px">
    <h2>Customers & Staff</h2>
    <div class="subtitle">Manage users, customers, and staff members.</div>

    <div class="table-card">
        <table>
            <thead>
                <tr>
                    <th>User</th>
                    <th>Contact</th>
                    <th>Role</th>
                    <th>Bookings</th>
                    <th>Total Spent</th>
                </tr>
            </thead>

            <tbody>
                @for (c of customers; track $index) {
                <tr>
                    <td>{{c.user_name}}</td>
                    <td>
                        {{c.email}}<br>
                        <small class="text-secondary">{{c.phone}}</small>
                    </td>
                    <td>{{c.role}}</td>
                    <td>{{ c.bookings }}</td>
                    <td>{{ c.total_spent | currency }}</td>
                </tr>
                }
            </tbody>
        </table>
    </div>
</div>
