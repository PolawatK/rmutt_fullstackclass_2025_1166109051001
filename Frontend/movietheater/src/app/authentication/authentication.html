<div class="bg"></div>

<div class="stage">

  <!-- Brand Section -->
  <div class="brand">
    <h1>Welcome<br>to <em>Cinevault theater</em></h1>
    <p>Cinevault</p>
    <div class="brand-line"></div>
  </div>

  <!-- Auth Card -->
  <div class="card">

    <!-- Tabs -->
    <div class="tabs">
      <button type="button" class="tab" [class.active]="activeTab === 'login'" (click)="setTab('login')">
        Login
      </button>

      <button type="button" class="tab" [class.active]="activeTab === 'register'" (click)="setTab('register')">
        Register
      </button>
    </div>

    <div class="form-wrapper">

      <!-- LOGIN -->
      <form #loginForm="ngForm" (ngSubmit)="onLogin(loginForm)" class="form" [class.active]="activeTab === 'login'">

        <input type="email" name="email" ngModel required placeholder="Email" />
        <input type="password" name="password" ngModel required placeholder="Password" />

        <button type="submit" class="btn">
          Sign In
        </button>
      </form>

      <!-- REGISTER -->
      <form #registerForm="ngForm" (ngSubmit)="onRegister(registerForm)" class="form"
        [class.active]="activeTab === 'register'">

        <input type="text" name="name" ngModel required placeholder="Full Name" />
        <input type="email" name="email" ngModel required placeholder="Email" />
        <input type="text" name="phone" ngModel required placeholder="Phone number" />
        <input type="password" name="password" ngModel required placeholder="Password" />

        <button type="submit" class="btn">
          Create Account
        </button>
      </form>

    </div>

  </div>
</div>
